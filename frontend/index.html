<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tesseract</title>
    <link href="./styles/output.css" rel="stylesheet">
  </head>
  <body class="m-0 p-0 bg-slate-700 text-white overflow-x-hidden">
    <header class="fixed top-0 left-0 right-0 h-16 bg-black/20 backdrop-blur-xl z-50">
        <nav class="h-full flex items-center justify-between px-9 md:px-9 2xl:px-16">
            <div class="left-container flex items-center gap-6 md:gap-12 2xl:gap-16">
                <a href="" class="text-[18px] md:text-[20px]">
                    tesseract
                </a>
                <div class="hidden items-center gap-5 sm:flex 2xl:gap-8">
                    <a href="">youtube</a>
                    <a href="">url</a>
                    <a href="">pdf</a>
                </div>
            </div>
            <div class="right-container hidden items-center gap-5 sm:flex">
                <a href="">made by <span class="transition-all duration-200 hover:underline">optim00s</span></a>
            </div>
        </nav>
    </header>
    <main class="pt-16 min-h-screen">
        <div class="mx-auto flex min-h-[calc(100vh-4rem)] max-w-[1800px] flex-col items-center justify-center gap-10 px-6 py-10 md:px-10 lg:flex-row lg:justify-between lg:gap-16 2xl:px-16">
            <!-- left container -->
            <div class="flex max-w-xl flex-col gap-8 text-center text-xl leading-8 text-slate-300 md:text-2xl lg:text-left lg:gap-12 2xl:max-w-2xl 2xl:text-3xl 2xl:leading-10">
                <div>
                    Tesseract is a study assistant that extracts content from YouTube,
                    URLs, and PDFs, then transforms it into concise summaries,
                    interactive flash-cards, and revision-ready notes.
                </div>
                <div class="flex flex-col gap-4 sm:flex-row sm:justify-center lg:justify-start">
                <a 
                    href="" 
                    class="inline-block bg-amber-400 px-5 py-3 rounded-lg font-medium text-slate-950 transition-all duration-300 hover:bg-amber-300 hover:-translate-y-1 hover:shadow-lg hover:shadow-amber-300/30 2xl:px-7 2xl:py-4 2xl:text-xl"
                >
                    Generate Now
                </a>

                <a 
                    href="" 
                    class="inline-block border border-sky-400/40 bg-sky-400/10 px-5 py-3 rounded-lg font-medium text-sky-200 transition-all duration-300 hover:border-sky-300 hover:bg-sky-400/20 hover:text-white hover:-translate-y-1 hover:shadow-lg hover:shadow-sky-400/20 2xl:px-7 2xl:py-4 2xl:text-xl"
                >
                    See Demo
                </a>
                </div>
            </div>
            <!-- right container -->
            <div class="w-full max-w-3xl lg:w-[55%] 2xl:max-w-5xl">
                <img 
                    src="./assets/hero.png" 
                    alt="comic themed hero image"
                    class="h-[360px] w-full rounded-[1.5rem] object-cover sm:h-[460px] lg:h-[560px] 2xl:h-[720px]"
                >
            </div>
        </div>
    </main>
    <footer>
    </footer>
  </body>
</html>
